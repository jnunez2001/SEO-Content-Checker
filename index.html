<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Checker — Josh Nunez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#7fb800;--orange:#f0840c;--red:#dc3232;--gray:#767676;
  --hi-bg:#fff3a3;--hi-border:#f0840c;
  --border:#ddd;--panel-bg:#f7f7f7;--white:#fff;
  --topbar:#1a1a1a;--text:#1e1e1e;--muted:#666;
  --inp-border:#ccc;--inp-focus:#7fb800;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#ebebeb;color:var(--text);display:flex;flex-direction:column;}

/* ── TOP BAR ── */
#topbar{background:var(--topbar);color:#fff;padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-badge{background:var(--green);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:3px;letter-spacing:.5px;}
.tb-title{font-size:14px;font-weight:500;color:#e0e0e0;}
.tb-author{font-size:11px;color:#888;}
#btn-analyze{background:var(--green);color:#fff;border:none;padding:9px 22px;border-radius:4px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.2px;transition:background .15s;}
#btn-analyze:hover{background:#6a9e00;}
#btn-analyze:active{background:#5a8800;}

/* ── LAYOUT ── */
#main{flex:1;display:flex;overflow:hidden;}

/* ── EDITOR COLUMN ── */
#editor-col{width:68%;background:#fff;overflow-y:auto;padding:22px 24px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg-hd{display:flex;justify-content:space-between;align-items:center;}
.lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.ctr{font-size:11px;color:var(--muted);}
.ctr.good{color:var(--green);}
.ctr.warn{color:var(--orange);}
.ctr.bad{color:var(--red);}
input[type=text],textarea{width:100%;padding:8px 11px;border:1px solid var(--inp-border);border-radius:4px;font-family:inherit;font-size:13.5px;color:var(--text);background:#fff;transition:border .15s;}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--inp-focus);box-shadow:0 0 0 1px var(--inp-focus);}
.slug-wrap{display:flex;border:1px solid var(--inp-border);border-radius:4px;overflow:hidden;background:#fff;transition:border .15s;}
.slug-wrap:focus-within{border-color:var(--inp-focus);box-shadow:0 0 0 1px var(--inp-focus);}
.slug-pre{background:#f5f5f5;padding:8px 10px;font-size:12.5px;color:var(--muted);border-right:1px solid var(--inp-border);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;}
.slug-wrap input{border:none;border-radius:0;flex:1;padding:8px 10px;font-size:13.5px;}
.slug-wrap input:focus{outline:none;box-shadow:none;}
textarea{resize:vertical;min-height:66px;line-height:1.6;}
#f-meta{min-height:62px;}

/* Rich text editor */
#editor-body{width:100%;min-height:340px;border:1px solid var(--inp-border);border-radius:4px;padding:14px 16px;font-size:15px;line-height:1.75;color:var(--text);outline:none;overflow-y:auto;background:#fff;transition:border .15s;}
#editor-body:focus{border-color:var(--inp-focus);box-shadow:0 0 0 1px var(--inp-focus);}
#editor-body:empty::before{content:attr(data-ph);color:#bbb;pointer-events:none;}
#editor-body h1{font-size:24px;font-weight:600;margin:10px 0 6px;line-height:1.3;}
#editor-body h2{font-size:19px;font-weight:600;margin:14px 0 5px;line-height:1.35;}
#editor-body h3{font-size:16px;font-weight:600;margin:12px 0 4px;line-height:1.4;}
#editor-body h4{font-size:14px;font-weight:600;margin:10px 0 4px;}
#editor-body p{margin:0 0 9px;}
#editor-body ul,#editor-body ol{margin:0 0 9px 22px;}
#editor-body li{margin-bottom:4px;}
#editor-body a{color:#0073aa;text-decoration:underline;}
#editor-body strong,#editor-body b{font-weight:600;}
#editor-body em,#editor-body i{font-style:italic;}
/* Highlights */
#editor-body .yhi{background:var(--hi-bg);border-bottom:2px solid var(--hi-border);border-radius:2px;padding:0 1px;}
#editor-body .yhi-el{background:#fff9e6;border-left:3px solid var(--hi-border);padding-left:10px;margin-left:-13px;border-radius:2px;display:block;}

.ed-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.wc{font-size:11px;color:var(--muted);}
.ph{font-size:11px;color:#bbb;font-style:italic;}

/* ── CHECKER COLUMN ── */
#checker-col{width:32%;background:var(--panel-bg);overflow-y:auto;display:flex;flex-direction:column;}

/* Tabs */
#tab-bar{display:flex;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0;position:sticky;top:0;z-index:10;}
.tab-btn{flex:1;padding:11px 6px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--green);}
.tab-face{font-size:15px;line-height:1;}

/* Score bar */
#score-bar{padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:14px;flex-shrink:0;flex-wrap:wrap;}
.si{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;}
.sd{width:9px;height:9px;border-radius:50%;background:var(--gray);flex-shrink:0;}
.sd.green{background:var(--green);}
.sd.orange{background:var(--orange);}
.sd.red{background:var(--red);}

/* Panels */
.rpanel{display:none;flex:1;}
.rpanel.active{display:block;}
.no-res{padding:28px 16px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;}
.no-res .ico{font-size:28px;margin-bottom:8px;}

/* Groups */
.rg{border-bottom:1px solid var(--border);}
.rg-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;background:#fff;border-bottom:1px solid #f0f0f0;user-select:none;}
.rg-hd:hover{background:#fafafa;}
.rg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.rg-title.red{color:var(--red);}
.rg-title.orange{color:var(--orange);}
.rg-title.green{color:var(--green);}
.rg-chev{font-size:10px;color:var(--muted);transition:transform .2s;}
.rg-chev.open{transform:rotate(180deg);}
.rg-body{display:none;}
.rg-body.open{display:block;}

/* Items */
.ri{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;background:#fff;border-bottom:1px solid #f5f5f5;}
.ri:last-child{border-bottom:none;}
.rdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.rdot.green{background:var(--green);}
.rdot.orange{background:var(--orange);}
.rdot.red{background:var(--red);}
.rdot.gray{background:var(--gray);}
.rc{flex:1;min-width:0;}
.rmsg{font-size:12px;color:var(--muted);line-height:1.55;}
.rmsg strong{color:#0073aa;font-weight:600;}
.eye{background:none;border:none;cursor:pointer;padding:1px 3px;border-radius:3px;font-size:15px;flex-shrink:0;color:#bbb;transition:color .15s,background .15s;line-height:1;}
.eye:hover{color:var(--muted);background:#efefef;}
.eye.on{color:var(--orange);}
.eye-off{visibility:hidden;font-size:15px;padding:1px 3px;flex-shrink:0;}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb-left">
    <span class="tb-badge">Pasado</span>
    <span class="tb-title">SEO Checker v1</span>
    <span class="tb-author">— developed by Joshua Nuñez</span>
  </div>
  <button id="btn-analyze">Analyze Content</button>
</div>

<div id="main">

  <!-- EDITOR -->
  <div id="editor-col">
    <div class="fg">
      <label class="lbl" for="f-kp">Focus Keyphrase</label>
      <input type="text" id="f-kp" placeholder="e.g. best solar panels Philippines">
    </div>
    <div class="fg">
      <div class="fg-hd">
        <label class="lbl" for="f-title">SEO Title</label>
        <span class="ctr" id="ctr-title">0 / 60</span>
      </div>
      <input type="text" id="f-title" placeholder="Enter your SEO title...">
    </div>
    <div class="fg">
      <label class="lbl">URL Slug</label>
      <div class="slug-wrap">
        <span class="slug-pre">yoursite.com /</span>
        <input type="text" id="f-slug" placeholder="your-article-slug">
      </div>
    </div>
    <div class="fg">
      <div class="fg-hd">
        <label class="lbl" for="f-meta">Meta Description</label>
        <span class="ctr" id="ctr-meta">0 / 156</span>
      </div>
      <textarea id="f-meta" placeholder="Write your meta description here..."></textarea>
    </div>
    <div class="fg">
      <label class="lbl">Article Body</label>
      <div id="editor-body" contenteditable="true"
        data-ph="Paste your article here from Google Docs — headings, bold, and links are preserved automatically."></div>
      <div class="ed-footer">
        <span class="wc" id="wc">0 words</span>
        <span class="ph">Paste from Google Docs — formatting preserved</span>
      </div>
    </div>
  </div>

  <!-- CHECKER PANEL -->
  <div id="checker-col">
    <div id="tab-bar">
      <button class="tab-btn active" data-tab="readability">
        <span class="tab-face" id="face-r">😐</span> Readability
      </button>
      <button class="tab-btn" data-tab="seo">
        <span class="tab-face" id="face-s">😐</span> SEO
      </button>
    </div>
    <div id="score-bar">
      <div class="si"><div class="sd" id="sd-r"></div><span id="sl-r">Not analyzed</span></div>
      <div class="si"><div class="sd" id="sd-s"></div><span id="sl-s">Not analyzed</span></div>
    </div>
    <div id="panel-readability" class="rpanel active">
      <div class="no-res"><div class="ico">📋</div>Click <strong>Analyze Content</strong> to check readability.</div>
    </div>
    <div id="panel-seo" class="rpanel">
      <div class="no-res"><div class="ico">🔍</div>Click <strong>Analyze Content</strong> to check SEO.</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// WORD LISTS
// ═══════════════════════════════════════════

const TW_PHRASES = [
  "without a doubt","with this purpose in mind","with this intention","with this in mind",
  "with the result that","with attention to","up to the present time","under those circumstances",
  "to summarize","to sum up","to start with","to show","to rephrase it","to repeat",
  "to point out","to paraphrase","to list","to illustrate","to explain","to enumerate",
  "to emphasize","to demonstrate","to conclude","to clarify","to begin with","to be sure",
  "that is to say","that is","so that","so as to","seeing that","prior to","owing to",
  "on the whole","on the other hand","on the contrary","on balance","not to mention",
  "not only","most importantly","most compelling evidence","must be remembered",
  "last but not least","just as","it follows that","in turn","in this situation",
  "in this case","in the same way","in the meantime","in the first place",
  "in the final analysis","in the event that","in the end","in that case","in summary",
  "in spite of","in short","in reality","in particular","in other words","in order to",
  "in order that","in like manner","in light of","in fact","in essence","in either case",
  "in effect","in detail","in contrast","in conclusion","in case","in any event",
  "in any case","in another case","in addition","in a similar fashion","given these points",
  "given that","for this reason","for this purpose","for the most part","for that reason",
  "for one thing","for instance","for example","first of all","even though","even so",
  "even more","even if","due to","despite this","compared with","compared to",
  "by the way","by the same token","by comparison","by and large","by all means",
  "because of this","at this time","at this point","at the same time","at length",
  "at least","at last","at first","at any rate","as well as","as soon as",
  "as opposed to","as long as","as an illustration","as a result","as a consequence",
  "all things considered","all in all","after that","after all","above all","what's more",
  "once again","one must also consider","sooner or later","such as","to that end",
  "to this end","to put it differently","to put it another way","point often overlooked",
  "summing up","a result of","as though","even as","in addition to"
];

const TW_WORDS = [
  "additionally","admittedly","afterward","also","although","and","another","as",
  "basically","because","besides","but","certainly","chiefly","comparatively",
  "consequently","contrarily","conversely","correspondingly","despite","different",
  "due","earlier","either","else","elsewhere","equally","especially","even",
  "eventually","evidently","except","exclusively","finally","first","firstly",
  "following","for","formerly","fourth","further","furthermore","given","hence",
  "henceforth","here","however","if","importantly","indeed","instead","later",
  "likewise","mainly","meanwhile","moreover","namely","nevertheless","next",
  "nonetheless","nor","notably","notwithstanding","now","obviously","once","only",
  "or","otherwise","overall","particularly","plus","previously","rather",
  "regardless","secondly","separately","similarly","since","so","soon","specially",
  "specifically","still","subsequently","such","then","thereafter","therefore",
  "third","thirdly","though","thus","together","typically","ultimately","unless",
  "until","usually","whenever","whereas","whether","while","yet","overall",
  "alternatively","accordingly","undoubtedly","instead","initially"
];

const IRR_PP = new Set([
  "abided","arisen","awoken","beaten","become","begun","bent","bet","bound","bitten",
  "bled","blown","broken","brought","built","burnt","burned","bought","caught","chosen",
  "come","cost","cut","dealt","dug","done","drawn","dreamt","dreamed","drunk","driven",
  "eaten","fallen","felt","fought","found","flown","forgotten","forgiven","frozen",
  "gotten","given","gone","grown","hung","had","heard","hidden","hit","held","hurt",
  "kept","known","laid","led","left","lent","let","lain","lit","lost","made","meant",
  "met","paid","put","read","ridden","rung","risen","run","said","seen","sold","sent",
  "set","shaken","shown","shrunk","shut","sung","sunk","sat","slept","spoken","spent",
  "spun","stood","stolen","stuck","struck","sworn","swum","taken","taught","torn",
  "told","thought","thrown","understood","woken","worn","won","written","been","done",
  "built","brought","caught","chosen","dealt","drawn","drunk","driven","eaten","fallen",
  "felt","fought","found","flown","forgotten","given","gone","grown","heard","held",
  "kept","known","laid","led","left","lent","lain","lit","lost","made","met","paid",
  "read","ridden","rung","risen","said","seen","sold","sent","shown","shut","sung",
  "sunk","sat","slept","spoken","spent","spun","stood","stolen","stuck","sworn",
  "swum","taken","taught","torn","told","thrown","understood","woken","worn","won","written"
]);

const BE_VERBS = new Set(["am","is","are","was","were","be","been","being"]);

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════

function countWords(t) {
  return (t || "").trim().split(/\s+/).filter(w => w.length > 0).length;
}

function splitSentences(text) {
  if (!text || !text.trim()) return [];
  // Protect abbreviations
  let t = text.replace(/\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|vs|etc|e\.g|i\.e|fig|no|No|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi, m => m.replace(".", "§§"));
  t = t.replace(/(\d+)\./g, "$1§§");
  // Split on sentence-ending punctuation followed by space+capital or end of string
  const parts = t.split(/(?<=[.!?])\s+(?=[A-ZÀ-Ú"'(])|(?<=[.!?])\s*$/);
  return parts.map(s => s.replace(/§§/g, ".").trim()).filter(s => s.length > 3);
}

function getTextContent(el) {
  return (el.innerText || el.textContent || "").trim();
}

function getContentWords(kp) {
  const fw = new Set(["a","an","the","and","or","but","in","on","at","to","for","of","with","by","from","is","are","was","were","be","been","being","have","has","had","do","does","did","will","would","could","should","may","might","can","my","your","his","her","its","our","their","this","that","these","those","i","we","you","he","she","it","they","what","which","who","how","when","where","why"]);
  return (kp || "").toLowerCase().split(/\s+/).filter(w => w.length > 0 && !fw.has(w));
}

function isPassive(sentence) {
  const words = sentence.toLowerCase().replace(/[^a-z\s]/g, " ").split(/\s+/).filter(Boolean);
  const beIdx = words.findIndex(w => BE_VERBS.has(w));
  if (beIdx === -1) return false;
  const after = words.slice(beIdx + 1, beIdx + 5);
  return after.some(w => IRR_PP.has(w) || (w.length > 3 && w.endsWith("ed")));
}

function hasTW(sentence) {
  const s = sentence.toLowerCase();
  const padded = " " + s.replace(/[^a-z\s']/g, " ") + " ";
  for (const ph of TW_PHRASES) {
    if (padded.includes(" " + ph + " ") || padded.includes(" " + ph + ",") ||
        padded.includes(" " + ph + ".") || s.startsWith(ph + " ") || s.startsWith(ph + ",")) return true;
  }
  const words = padded.split(/\s+/).filter(Boolean);
  for (const tw of TW_WORDS) {
    if (words.includes(tw)) return true;
  }
  return false;
}

function getEditorData() {
  const ed = document.getElementById("editor-body");
  const paragraphs = Array.from(ed.querySelectorAll("p, li"))
    .map(el => ({ el, text: getTextContent(el), wc: countWords(getTextContent(el)) }))
    .filter(p => p.text.length > 0);
  const subheadings = Array.from(ed.querySelectorAll("h2,h3"));
  const allLinks = Array.from(ed.querySelectorAll("a"));
  const fullText = getTextContent(ed);

  // Build all sentences with parent el reference
  const allSentences = [];
  Array.from(ed.querySelectorAll("p, li")).forEach(el => {
    const t = getTextContent(el);
    if (!t) return;
    splitSentences(t).forEach(s => { if (s.length > 3) allSentences.push({ el, text: s }); });
  });

  return { ed, paragraphs, subheadings, allLinks, fullText, allSentences, totalWords: countWords(fullText) };
}

// ═══════════════════════════════════════════
// HIGHLIGHT SYSTEM
// ═══════════════════════════════════════════

let _activeEye = null;

function clearHighlights() {
  document.querySelectorAll(".yhi-el").forEach(el => el.classList.remove("yhi-el"));
  document.querySelectorAll("[data-orig]").forEach(el => {
    el.innerHTML = el.dataset.orig;
    delete el.dataset.orig;
  });
  if (_activeEye) { _activeEye.classList.remove("on"); _activeEye = null; }
}

function hlElements(els) {
  if (!els || els.length === 0) return;
  els.forEach(el => el.classList.add("yhi-el"));
  els[0].scrollIntoView({ behavior: "smooth", block: "center" });
}

function hlSentences(byEl) {
  // byEl: Map of el -> [sentence strings]
  let first = null;
  byEl.forEach((sents, el) => {
    if (el.dataset.orig !== undefined) return;
    el.dataset.orig = el.innerHTML;
    let html = el.innerHTML;
    sents.forEach(s => {
      const sc = s.trim();
      if (!sc || sc.length < 3) return;
      // Try simple indexOf match against text content
      const idx = html.indexOf(sc);
      if (idx >= 0) {
        html = html.substring(0, idx) + '<span class="yhi">' + sc + "</span>" + html.substring(idx + sc.length);
      } else {
        // Fallback: try case-insensitive match
        const lcIdx = html.toLowerCase().indexOf(sc.toLowerCase());
        if (lcIdx >= 0) {
          html = html.substring(0, lcIdx) + '<span class="yhi">' + html.substring(lcIdx, lcIdx + sc.length) + "</span>" + html.substring(lcIdx + sc.length);
        }
      }
    });
    el.innerHTML = html;
    if (!first) first = el;
  });
  if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
}

function activateEye(btn, fn) {
  if (_activeEye === btn) { clearHighlights(); return; }
  clearHighlights();
  _activeEye = btn;
  btn.classList.add("on");
  fn();
}

// ═══════════════════════════════════════════
// READABILITY CHECKS
// ═══════════════════════════════════════════

function chkSentenceLength(allSentences) {
  const total = allSentences.length;
  if (total === 0) return null;
  const long = allSentences.filter(s => countWords(s.text) > 20);
  const pct = Math.round((long.length / total) * 100);
  let color, score, msg;
  if (pct <= 25) { color = "green"; score = 9; msg = "Sentence length: Great!"; }
  else if (pct <= 30) { color = "orange"; score = 6; msg = `Sentence length: ${long.length} of the sentences contain more than 20 words (${pct}%). Try to shorten the sentences.`; }
  else { color = "red"; score = 3; msg = `Sentence length: ${long.length} of the sentences contain more than 20 words (${pct}%), which is more than the recommended maximum of 25%. <strong>Try to shorten the sentences.</strong>`; }
  const byEl = groupByEl(long);
  return { id: "sl", title: "Sentence length", color, score, msg, canHL: long.length > 0, hl: () => hlSentences(byEl) };
}

function chkParagraphLength(paragraphs) {
  const vl = paragraphs.filter(p => p.wc > 200);
  const lo = paragraphs.filter(p => p.wc > 150 && p.wc <= 200);
  let color, score, msg;
  if (vl.length > 0) { color = "red"; score = 3; msg = `Paragraph length: ${vl.length} of the paragraphs contain more than the recommended maximum of 200 words. <strong>Shorten your paragraphs!</strong>`; }
  else if (lo.length > 0) { color = "orange"; score = 6; msg = `Paragraph length: ${lo.length} of the paragraphs contain more than the recommended maximum of 150 words. <strong>Shorten your paragraphs!</strong>`; }
  else { color = "green"; score = 9; msg = "Paragraph length: There are no paragraphs that are too long. Great job!"; }
  const targets = vl.length > 0 ? vl : lo;
  return { id: "pl", title: "Paragraph length", color, score, msg, canHL: targets.length > 0, hl: () => hlElements(targets.map(p => p.el)) };
}

function chkSubheadings(ed, totalWords) {
  // Deep traversal — handles Google Docs <b> wrapper and any other nesting.
  // Builds an ordered flat list of {type:'sub'|'block', el, wc} items.
  const INLINE = new Set(["span","strong","em","b","i","a","br","img","u","s","sub","sup","code","mark"]);
  const BLOCK  = new Set(["p","li","blockquote","pre","dd","dt"]);
  const SUB    = new Set(["h2","h3"]);
  const SKIP   = new Set(["h1","h4","h5","h6","script","style"]);

  const ordered = [];
  function collect(node) {
    Array.from(node.childNodes).forEach(child => {
      if (child.nodeType !== 1) return; // skip text/comment nodes
      const tag = child.tagName.toLowerCase();
      if (SUB.has(tag)) {
        ordered.push({ type: "sub", el: child });
      } else if (SKIP.has(tag)) {
        // h1 = title; h4-h6 = don't count words, don't treat as divider
      } else if (BLOCK.has(tag)) {
        const wc = countWords(getTextContent(child));
        if (wc > 0) ordered.push({ type: "block", el: child, wc });
      } else if (!INLINE.has(tag)) {
        // Container (div, ul, ol, b used as wrapper by Docs, etc.) — recurse
        collect(child);
      }
    });
  }
  collect(ed);

  // Build sections of content between subheadings
  const sections = [];
  let cur = { wc: 0, els: [] };
  ordered.forEach(item => {
    if (item.type === "sub") {
      if (cur.wc > 0) sections.push(cur);   // only push non-empty sections
      cur = { wc: 0, els: [] };
    } else {
      cur.wc += item.wc;
      cur.els.push(item.el);
    }
  });
  if (cur.wc > 0) sections.push(cur);       // push final section if non-empty

  const hasSubheadings = ordered.some(item => item.type === "sub");
  const veryLong = sections.filter(s => s.wc > 350);
  const med      = sections.filter(s => s.wc > 300 && s.wc <= 350);

  let color, score, msg;
  if (!hasSubheadings) {
    if (totalWords <= 300) {
      color = "green"; score = 9;
      msg = "Subheading distribution: You are not using any subheadings, but your text is short enough and probably doesn't need them.";
    } else {
      color = "red"; score = 3;
      msg = "Subheading distribution: You are not using any subheadings, although your text is rather long. <strong>Try and add some subheadings.</strong>";
    }
  } else if (veryLong.length > 0) {
    color = "red"; score = 3;
    msg = `Subheading distribution: ${veryLong.length} section(s) of your text are longer than the recommended 350 words. <strong>Add subheadings to improve readability.</strong>`;
  } else if (med.length > 0) {
    color = "orange"; score = 6;
    msg = `Subheading distribution: ${med.length} section(s) are between 300–350 words with no subheading. Consider adding subheadings.`;
  } else {
    color = "green"; score = 9;
    msg = "Subheading distribution: Great job!";
  }

  const targets = veryLong.length > 0 ? veryLong : med;
  return { id: "sh", title: "Subheading distribution", color, score, msg, canHL: targets.length > 0, hl: () => hlElements(targets.flatMap(s => s.els)) };
}

function chkConsecutive(allSentences) {
  // Group by parent element first — never check across paragraph boundaries.
  const byEl = new Map();
  allSentences.forEach(s => {
    if (!byEl.has(s.el)) byEl.set(s.el, []);
    byEl.get(s.el).push(s);
  });
  const found = [];
  byEl.forEach(sents => {
    for (let i = 0; i < sents.length - 2; i++) {
      const w0 = firstWord(sents[i].text);
      const w1 = firstWord(sents[i + 1].text);
      const w2 = firstWord(sents[i + 2].text);
      if (w0 && w0.length > 1 && w0 === w1 && w1 === w2) {
        const grp = [sents[i], sents[i + 1], sents[i + 2]];
        let j = i + 3;
        while (j < sents.length && firstWord(sents[j].text) === w0) { grp.push(sents[j]); j++; }
        found.push(grp);
        i = j - 1;
      }
    }
  });
  if (found.length > 0) {
    const grp = found[0];
    const byElGrp = groupByEl(grp);
    return { id: "cs", title: "Consecutive sentences", color: "red", score: 3, msg: `Consecutive sentences: The text contains ${grp.length} consecutive sentences starting with the same word. <strong>Try to mix things up!</strong>`, canHL: true, hl: () => hlSentences(byElGrp) };
  }
  return { id: "cs", title: "Consecutive sentences", color: "green", score: 9, msg: "Consecutive sentences: There are no repetitive sentence beginnings. That's great!", canHL: false };
}

function chkPassiveVoice(allSentences) {
  const total = allSentences.length;
  if (total === 0) return null;
  const passive = allSentences.filter(s => isPassive(s.text));
  const pct = Math.round((passive.length / total) * 100);
  let color, score, msg;
  if (pct <= 10) { color = "green"; score = 9; msg = "Passive voice: You are not using too much passive voice. That's great!"; }
  else if (pct <= 15) { color = "orange"; score = 6; msg = `Passive voice: ${passive.length} of the sentences contain passive voice (${pct}%), which is more than the recommended maximum of 10%. Try to use their active counterparts.`; }
  else { color = "red"; score = 3; msg = `Passive voice: ${passive.length} of the sentences contain passive voice (${pct}%), which is more than the recommended maximum of 10%. <strong>Try to use their active counterparts.</strong>`; }
  const byEl = groupByEl(passive);
  return { id: "pv", title: "Passive voice", color, score, msg, canHL: passive.length > 0, hl: () => hlSentences(byEl) };
}

function chkTransitionWords(allSentences) {
  const total = allSentences.length;
  if (total === 0) return null;
  const tw = allSentences.filter(s => hasTW(s.text));
  const no = allSentences.filter(s => !hasTW(s.text));
  const pct = Math.round((tw.length / total) * 100);
  const totalWC = allSentences.reduce((a, s) => a + countWords(s.text), 0);
  const isShort = totalWC < 200;
  let color, score, msg;
  if (isShort) {
    color = "green"; score = 9;
    msg = tw.length > 0 ? "Transition words: Well done!" : "Transition words: You are not using any transition words, but your text is short enough and probably doesn't need them.";
  } else if (pct >= 30) { color = "green"; score = 9; msg = "Transition words: Well done!"; }
  else if (pct >= 20) { color = "orange"; score = 6; msg = `Transition words: Only ${pct}% of the sentences contain transition words. <strong>Use more transition words.</strong>`; }
  else if (tw.length === 0) { color = "red"; score = 3; msg = "Transition words: None of the sentences contain transition words. <strong>Use some.</strong>"; }
  else { color = "red"; score = 3; msg = `Transition words: Only ${pct}% of the sentences contain transition words. This is not enough. <strong>Use more transition words.</strong>`; }
  const byEl = groupByEl(no);
  return { id: "tw", title: "Transition words", color, score, msg, canHL: no.length > 0 && !isShort, hl: () => hlSentences(byEl) };
}

// ═══════════════════════════════════════════
// SEO CHECKS
// ═══════════════════════════════════════════

function chkKpIntro(paragraphs, kp) {
  const cw = getContentWords(kp);
  if (!kp.trim()) return mkR("ki", "Keyphrase in introduction", "red", 3, "Keyphrase in introduction: Please set a focus keyphrase.", false);
  if (paragraphs.length === 0) return mkR("ki", "Keyphrase in introduction", "red", 3, "Keyphrase in introduction: Please add some content.", false);
  const fp = paragraphs[0];
  const ft = getTextContent(fp.el).toLowerCase();
  const allFound = cw.every(w => ft.includes(w));
  if (!allFound) return { id: "ki", title: "Keyphrase in introduction", color: "red", score: 3, msg: "Keyphrase in introduction: Your keyphrase or its synonyms do not appear in the first paragraph. <strong>Make sure the topic is clear immediately.</strong>", canHL: true, hl: () => hlElements([fp.el]) };
  const inOne = splitSentences(getTextContent(fp.el)).some(s => cw.every(w => s.toLowerCase().includes(w)));
  if (!inOne) return { id: "ki", title: "Keyphrase in introduction", color: "orange", score: 6, msg: "Keyphrase in introduction: Your keyphrase appears in the first paragraph, but not within one sentence. <strong>Fix that!</strong>", canHL: true, hl: () => hlElements([fp.el]) };
  return mkR("ki", "Keyphrase in introduction", "green", 9, "Keyphrase in introduction: Well done!", false);
}

function chkKpLength(kp) {
  if (!kp.trim()) return mkR("kl", "Keyphrase length", "red", -999, "Keyphrase length: No focus keyphrase was set. <strong>Set a focus keyphrase to calculate your SEO score.</strong>", false);
  const cw = getContentWords(kp);
  const len = cw.length;
  if (len > 8) return mkR("kl", "Keyphrase length", "red", 3, `Keyphrase length: The keyphrase contains ${len} content words. That's way more than the recommended maximum of 8. <strong>Make it shorter!</strong>`, false);
  if (len >= 5) return mkR("kl", "Keyphrase length", "orange", 6, `Keyphrase length: The keyphrase contains ${len} content words. That's more than the recommended maximum of 4. Consider making it shorter.`, false);
  return mkR("kl", "Keyphrase length", "green", 9, "Keyphrase length: Good job!", false);
}

function chkKpDensity(allSentences, kp) {
  if (!kp.trim()) return mkR("kd", "Keyphrase density", "red", 3, "Keyphrase density: Please add both a keyphrase and some text.", false);
  const cw = getContentWords(kp);
  const allText = allSentences.map(s => s.text).join(" ");
  const totalWC = countWords(allText);
  if (totalWC < 10) return mkR("kd", "Keyphrase density", "red", 3, "Keyphrase density: Please add some content.", false);
  const matches = allSentences.filter(s => cw.every(w => s.text.toLowerCase().includes(w)));
  const count = matches.length;
  const density = totalWC > 0 ? (count * cw.length / totalWC) * 100 : 0;
  let color, score, msg;
  if (totalWC >= 100) {
    if (density > 4) { color="red"; score=-50; msg=`Keyphrase density: The keyphrase was found ${count} times. That's way more than the recommended maximum. <strong>Don't overoptimize!</strong>`; }
    else if (density > 3) { color="red"; score=-10; msg=`Keyphrase density: The keyphrase was found ${count} times. That's more than the recommended maximum. <strong>Don't overoptimize!</strong>`; }
    else if (density >= 0.5) { color="green"; score=9; msg=`Keyphrase density: The keyphrase was found ${count} time(s). This is great!`; }
    else if (count === 0) { color="red"; score=4; msg=`Keyphrase density: The keyphrase was found 0 times. <strong>Focus on your keyphrase!</strong>`; }
    else { color="red"; score=4; msg=`Keyphrase density: The keyphrase was found ${count} time(s). That's less than the recommended minimum. <strong>Focus on your keyphrase!</strong>`; }
  } else {
    if (count >= 1 && count <= 2) { color="green"; score=9; msg=`Keyphrase density: The keyphrase was found ${count} time(s). This is great!`; }
    else if (count > 2) { color="red"; score=-50; msg=`Keyphrase density: The keyphrase was found ${count} times. Too much for a short text. <strong>Don't overoptimize!</strong>`; }
    else { color="red"; score=4; msg=`Keyphrase density: The keyphrase was not found. <strong>Focus on your keyphrase!</strong>`; }
  }
  const byEl = groupByEl(matches);
  return { id:"kd", title:"Keyphrase density", color, score, msg, canHL: matches.length > 0, hl: () => hlSentences(byEl) };
}

function chkKpTitle(titleVal, kp) {
  if (!kp.trim()) return mkR("kt", "Keyphrase in SEO title", "red", 3, "Keyphrase in SEO title: Please set a focus keyphrase.", false);
  if (!titleVal.trim()) return mkR("kt", "Keyphrase in SEO title", "red", 3, "Keyphrase in SEO title: Please add an SEO title.", false);
  const cw = getContentWords(kp);
  const found = cw.every(w => titleVal.toLowerCase().includes(w));
  if (!found) return mkR("kt", "Keyphrase in SEO title", "red", 3, "Keyphrase in SEO title: The focus keyphrase does not appear in the SEO title. <strong>Fix that!</strong>", false);
  return mkR("kt", "Keyphrase in SEO title", "green", 9, "Keyphrase in SEO title: The focus keyphrase appears in the SEO title. Well done!", false);
}

function chkTitleWidth(titleVal) {
  const len = titleVal.length;
  if (!titleVal.trim()) return mkR("tw2", "SEO title width", "red", 3, "SEO title width: Please add an SEO title.", false);
  if (len <= 60) return mkR("tw2", "SEO title width", "green", 9, "SEO title width: The SEO title has a nice length. Well done!", false);
  if (len <= 70) return mkR("tw2", "SEO title width", "orange", 6, `SEO title width: The SEO title is slightly too long (${len} chars). Try to keep it under 60 characters.`, false);
  return mkR("tw2", "SEO title width", "red", 3, `SEO title width: The SEO title is too long (${len} chars). Recommended maximum is 60 characters.`, false);
}

function chkMetaKp(metaVal, kp) {
  if (!kp.trim() || !metaVal.trim()) return mkR("mk", "Keyphrase in meta description", "red", 3, "Keyphrase in meta description: Please add both a keyphrase and a meta description.", false);
  const cw = getContentWords(kp);
  const sentences = metaVal.split(/[.!?]+/).filter(s => s.trim());
  const matchCount = sentences.filter(s => cw.every(w => s.toLowerCase().includes(w))).length;
  const found = cw.every(w => metaVal.toLowerCase().includes(w));
  if (!found) return mkR("mk", "Keyphrase in meta description", "red", 3, "Keyphrase in meta description: The meta description does not contain the keyphrase. <strong>Fix that!</strong>", false);
  if (matchCount > 2) return mkR("mk", "Keyphrase in meta description", "red", 3, "Keyphrase in meta description: The keyphrase appears too many times in the meta description. <strong>Limit that!</strong>", false);
  return mkR("mk", "Keyphrase in meta description", "green", 9, "Keyphrase in meta description: Keyphrase appears in the meta description. Well done!", false);
}

function chkMetaLength(metaVal) {
  const len = metaVal.trim().length;
  if (len === 0) return mkR("ml", "Meta description length", "red", 3, "Meta description length: No meta description has been specified. <strong>Add one!</strong>", false);
  if (len >= 120 && len <= 156) return mkR("ml", "Meta description length", "green", 9, "Meta description length: Well done!", false);
  if (len < 120) return mkR("ml", "Meta description length", "orange", 6, `Meta description length: The meta description is too short (${len} chars). Aim for 120–156 characters.`, false);
  return mkR("ml", "Meta description length", "orange", 6, `Meta description length: The meta description is over 156 characters (${len} chars). Trim it down.`, false);
}

function chkSlug(slugVal, kp) {
  if (!kp.trim()) return mkR("ks", "Keyphrase in slug", "red", 3, "Keyphrase in slug: Please set a focus keyphrase.", false);
  if (!slugVal.trim()) return mkR("ks", "Keyphrase in slug", "red", 3, "Keyphrase in slug: Please add a URL slug.", false);
  const cw = getContentWords(kp);
  const slugClean = slugVal.toLowerCase().replace(/-/g, " ");
  const found = cw.every(w => slugClean.includes(w));
  if (found) return mkR("ks", "Keyphrase in slug", "green", 9, "Keyphrase in slug: The focus keyphrase appears in the URL slug. Well done!", false);
  return mkR("ks", "Keyphrase in slug", "red", 3, "Keyphrase in slug: The focus keyphrase does not appear in the URL slug. <strong>Fix that!</strong>", false);
}

function chkKpSubheadings(subs, kp, totalWords) {
  if (!kp.trim()) return mkR("ks2", "Keyphrase in subheadings", "red", 3, "Keyphrase in subheadings: Please add a focus keyphrase.", false);
  const cw = getContentWords(kp);
  if (subs.length === 0) {
    if (totalWords <= 300) return mkR("ks2", "Keyphrase in subheadings", "green", 9, "Keyphrase in subheadings: No subheadings, but your text is short enough. That's fine.", false);
    return mkR("ks2", "Keyphrase in subheadings", "red", 2, "Keyphrase in subheadings: You are not using any higher-level subheadings. <strong>Fix that!</strong>", false);
  }
  const matching = subs.filter(h => {
    const ht = getTextContent(h).toLowerCase();
    const mc = cw.filter(w => ht.includes(w)).length;
    return mc >= Math.ceil(cw.length * 0.5);
  });
  const pct = (matching.length / subs.length) * 100;
  if (subs.length === 1 && matching.length === 1) return mkR("ks2", "Keyphrase in subheadings", "green", 9, "Keyphrase in subheadings: Your subheading reflects the topic of your copy. Good job!", false);
  if (pct > 75) return { id:"ks2", title:"Keyphrase in subheadings", color:"red", score:3, msg:"Keyphrase in subheadings: More than 75% of your subheadings reflect the topic. That's too much. <strong>Don't over-optimize!</strong>", canHL:true, hl:()=>hlElements(matching) };
  if (pct >= 30) return mkR("ks2", "Keyphrase in subheadings", "green", 9, `Keyphrase in subheadings: ${matching.length} of your subheadings reflect the topic of your copy. Good job!`, false);
  return { id:"ks2", title:"Keyphrase in subheadings", color:"red", score:3, msg:"Keyphrase in subheadings: <strong>Use more keyphrases in your higher-level subheadings!</strong>", canHL:true, hl:()=>hlElements(subs.filter(h=>!matching.includes(h))) };
}

function chkTextLength(totalWords) {
  if (totalWords >= 300) return mkR("tl", "Text length", "green", 9, `Text length: The text contains ${totalWords} words. Good job!`, false);
  if (totalWords >= 200) return mkR("tl", "Text length", "orange", 6, `Text length: The text contains ${totalWords} words. This is slightly below the recommended minimum of 300 words. Add more content.`, false);
  if (totalWords > 0) return mkR("tl", "Text length", "red", 3, `Text length: The text contains ${totalWords} words. This is far below the recommended minimum of 300 words. <strong>Add more content.</strong>`, false);
  return mkR("tl", "Text length", "red", 3, "Text length: Please add some content.", false);
}

function chkInternalLinks(links) {
  const int = links.filter(a => { const h = (a.getAttribute("href")||"").trim(); return h.startsWith("/") || (h.length > 0 && !h.startsWith("http") && !h.startsWith("mailto") && !h.startsWith("#")); });
  if (int.length > 0) return mkR("il", "Internal links", "green", 9, `Internal links: ${int.length} internal link(s) found. Good job!`, false);
  return mkR("il", "Internal links", "red", 3, "Internal links: No internal links appear in this page. <strong>Add some!</strong>", false);
}

function chkOutboundLinks(links) {
  const ext = links.filter(a => { const h = (a.getAttribute("href")||"").trim(); return h.startsWith("http://") || h.startsWith("https://"); });
  if (ext.length > 0) return mkR("ol", "Outbound links", "green", 9, `Outbound links: ${ext.length} outbound link(s) found. Good job!`, false);
  return mkR("ol", "Outbound links", "red", 3, "Outbound links: No outbound links appear on this page. <strong>Add some!</strong>", false);
}

function chkCompeting(links, kp) {
  if (!kp.trim()) return mkR("cl", "Competing links", "green", 8, "Competing links: No competing links found. Nice!", false);
  const cw = getContentWords(kp);
  const comp = links.filter(a => { const t = getTextContent(a).toLowerCase(); return cw.every(w => t.includes(w)); });
  if (comp.length > 0) return { id:"cl", title:"Competing links", color:"red", score:2, msg:"Competing links: You have a link using your keyphrase as anchor text. <strong>Fix that!</strong>", canHL:true, hl:()=>hlElements(comp) };
  return mkR("cl", "Competing links", "green", 8, "Competing links: There are no links using your keyphrase as anchor text. Nice!", false);
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════

function mkR(id, title, color, score, msg, canHL) {
  return { id, title, color, score, msg, canHL, hl: null };
}

function firstWord(s) {
  return (s || "").trim().toLowerCase().split(/\s+/)[0]?.replace(/[^a-z]/g, "") || "";
}

function groupByEl(items) {
  const m = new Map();
  items.forEach(item => {
    if (!m.has(item.el)) m.set(item.el, []);
    m.get(item.el).push(item.text);
  });
  return m;
}

// ═══════════════════════════════════════════
// MAIN ANALYSIS
// ═══════════════════════════════════════════

function runAnalysis() {
  clearHighlights();
  const kp = document.getElementById("f-kp").value.trim();
  const titleVal = document.getElementById("f-title").value.trim();
  const slugVal = document.getElementById("f-slug").value.trim();
  const metaVal = document.getElementById("f-meta").value.trim();
  const { ed, paragraphs, subheadings, allLinks, allSentences, totalWords } = getEditorData();

  const rR = [
    chkSentenceLength(allSentences),
    chkParagraphLength(paragraphs),
    chkSubheadings(ed, totalWords),
    chkConsecutive(allSentences),
    chkPassiveVoice(allSentences),
    chkTransitionWords(allSentences)
  ].filter(Boolean);

  const sR = [
    chkKpIntro(paragraphs, kp),
    chkKpLength(kp),
    chkKpDensity(allSentences, kp),
    chkKpTitle(titleVal, kp),
    chkTitleWidth(titleVal),
    chkMetaKp(metaVal, kp),
    chkMetaLength(metaVal),
    chkSlug(slugVal, kp),
    chkKpSubheadings(subheadings, kp, totalWords),
    chkTextLength(totalWords),
    chkInternalLinks(allLinks),
    chkOutboundLinks(allLinks),
    chkCompeting(allLinks, kp)
  ].filter(Boolean);

  renderPanel("readability", rR);
  renderPanel("seo", sR);
  updateScores(rR, sR);
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════

function renderPanel(type, results) {
  const panel = document.getElementById("panel-" + type);
  const red = results.filter(r => r.color === "red");
  const orange = results.filter(r => r.color === "orange");
  const green = results.filter(r => r.color === "green");
  let html = "";
  if (red.length > 0) html += renderGroup("Problems", "red", red, true);
  if (orange.length > 0) html += renderGroup("Improvements", "orange", orange, true);
  if (green.length > 0) html += renderGroup("Good results", "green", green, false);
  panel.innerHTML = html || '<div class="no-res"><div class="ico">✅</div>All checks passed!</div>';
  // Attach eye events
  panel.querySelectorAll(".eye").forEach(btn => {
    const id = btn.dataset.id;
    const r = results.find(x => x.id === id);
    if (r && r.canHL && r.hl) btn.addEventListener("click", () => activateEye(btn, r.hl));
  });
  // Accordions
  panel.querySelectorAll(".rg-hd").forEach(hd => {
    hd.addEventListener("click", () => {
      hd.nextElementSibling.classList.toggle("open");
      hd.querySelector(".rg-chev").classList.toggle("open");
    });
  });
}

function renderGroup(label, color, results, open) {
  return `<div class="rg">
    <div class="rg-hd">
      <span class="rg-title ${color}">${label} (${results.length})</span>
      <span class="rg-chev ${open?"open":""}">▼</span>
    </div>
    <div class="rg-body ${open?"open":""}">
      ${results.map(renderItem).join("")}
    </div>
  </div>`;
}

function renderItem(r) {
  const eye = r.canHL
    ? `<button class="eye" data-id="${r.id}" title="Highlight in editor">👁</button>`
    : `<span class="eye-off">👁</span>`;
  return `<div class="ri">
    <div class="rdot ${r.color}"></div>
    <div class="rc"><div class="rmsg">${r.msg}</div></div>
    ${eye}
  </div>`;
}

function updateScores(rR, sR) {
  // Readability: penalty points
  let pen = 0;
  rR.forEach(r => { if (r.score <= 4) pen += 3; else if (r.score <= 7) pen += 2; });
  const rColor = pen >= 6 ? "red" : pen >= 4 ? "orange" : "green";
  const rFace = pen >= 6 ? "🤦‍♂️" : pen >= 4 ? "🤏" : "🔥";
  const rLabel = pen >= 6 ? "Needs improvement" : pen >= 4 ? "OK" : "Good";
  document.getElementById("face-r").textContent = rFace;
  document.getElementById("sd-r").className = "sd " + rColor;
  document.getElementById("sl-r").textContent = "Readability: " + rLabel;

  // SEO: average score
  const vals = sR.map(r => Math.max(0, r.score));
  const avg = vals.length > 0 ? (vals.reduce((a, b) => a + b, 0) / (vals.length * 9)) * 100 : 0;
  const sColor = avg >= 75 ? "green" : avg >= 41 ? "orange" : "red";
  const sFace = avg >= 75 ? "🔥" : avg >= 41 ? "🤏" : "🤦‍♂️";
  const sLabel = avg >= 75 ? "Good" : avg >= 41 ? "OK" : "Needs improvement";
  document.getElementById("face-s").textContent = sFace;
  document.getElementById("sd-s").className = "sd " + sColor;
  document.getElementById("sl-s").textContent = `SEO: ${sLabel} (${Math.round(avg)}%)`;
}

// ═══════════════════════════════════════════
// LIVE COUNTERS & EVENTS
// ═══════════════════════════════════════════

document.getElementById("f-title").addEventListener("input", function () {
  const len = this.value.length;
  const el = document.getElementById("ctr-title");
  el.textContent = len + " / 60";
  el.className = "ctr " + (len <= 60 ? "good" : len <= 70 ? "warn" : "bad");
});

document.getElementById("f-meta").addEventListener("input", function () {
  const len = this.value.length;
  const el = document.getElementById("ctr-meta");
  el.textContent = len + " / 156";
  el.className = "ctr " + (len >= 120 && len <= 156 ? "good" : len > 156 ? "bad" : "");
});

document.getElementById("f-slug").addEventListener("input", function () {
  const cur = this.selectionStart;
  this.value = this.value.toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9\-]/g, "");
  try { this.setSelectionRange(cur, cur); } catch(e){}
});

const edBody = document.getElementById("editor-body");
edBody.addEventListener("input", function () {
  const w = countWords(this.innerText || "");
  document.getElementById("wc").textContent = w + " word" + (w !== 1 ? "s" : "");
});

// ── PASTE HANDLER ──
edBody.addEventListener("paste", function (e) {
  e.preventDefault();
  const html = e.clipboardData.getData("text/html");
  const text = e.clipboardData.getData("text/plain");
  const cleaned = html ? cleanPaste(html) : plainToHTML(text);
  try {
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const frag = range.createContextualFragment(cleaned);
      const lastNode = frag.lastChild;
      range.insertNode(frag);
      if (lastNode) { const r2 = document.createRange(); r2.setStartAfter(lastNode); r2.collapse(true); sel.removeAllRanges(); sel.addRange(r2); }
    } else {
      edBody.innerHTML += cleaned;
    }
  } catch (err) {
    edBody.innerHTML += cleaned;
  }
  const w = countWords(edBody.innerText || "");
  document.getElementById("wc").textContent = w + " word" + (w !== 1 ? "s" : "");
});

function cleanPaste(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  // Remove noise elements
  doc.querySelectorAll("script,style,meta,link,head").forEach(e => e.remove());
  // Strip attributes
  doc.querySelectorAll("*").forEach(el => {
    ["style","class","id","lang","dir","data-font-size","bgcolor","align","valign","width","height","cellpadding","cellspacing","border"].forEach(a => el.removeAttribute(a));
  });
  // Unwrap spans
  doc.querySelectorAll("span").forEach(s => {
    if (!s.parentNode) return;
    const p = s.parentNode;
    while (s.firstChild) p.insertBefore(s.firstChild, s);
    p.removeChild(s);
  });
  // Unwrap divs/sections (convert to p if needed)
  doc.querySelectorAll("div,section,article,aside,header,footer,nav,figure,figcaption,table,tr,td,th,tbody,thead,tfoot,colgroup,col,caption").forEach(el => {
    if (!el.parentNode) return;
    const p = el.parentNode;
    while (el.firstChild) p.insertBefore(el.firstChild, el);
    p.removeChild(el);
  });
  // Remove empty elements
  doc.querySelectorAll("p,h1,h2,h3,h4,li").forEach(el => {
    if (!(el.textContent||"").trim()) el.remove();
  });
  return doc.body.innerHTML || "";
}

function plainToHTML(text) {
  const paras = text.split(/\n\n+/).filter(p => p.trim());
  if (paras.length === 0) return `<p>${text}</p>`;
  return paras.map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`).join("");
}

// ── TABS ──
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".rpanel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
  });
});

// ── ANALYZE ──
document.getElementById("btn-analyze").addEventListener("click", runAnalysis);

// ── KEYBOARD SHORTCUT ──
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") runAnalysis();
});
